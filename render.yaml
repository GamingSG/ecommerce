services:
  - type: web
    name: ecommerce-app
    env: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
